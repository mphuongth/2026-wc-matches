  input[type=text]:focus { border-color: #4af; outline: none; }

  input.ok { border-color: #4a4; background: #001800; }

    font-size: 12px; color: #cfc; display: none;
  }
  #output.has-changes { display: block; }
  button {
    margin-top: 14px; padding: 8px 20px; background: #4af; color: #000;
    border: none; cursor: pointer; font-size: 13px; font-weight: bold;
    border-radius: 4px; font-family: monospace;
  }
  button:hover { background: #6cf; }
  .legend { margin-bottom: 10px; font-size: 11px; color: #888; }
  .legend span { margin-right: 16px; }
  .dot-ok { color: #4a4; }
  .dot-chg { color: #fa4; }
  .dot-empty { color: #555; }
  #summary { margin-top: 10px; font-size: 12px; color: #fa4; }

<body>

  rồi nhập giờ VNT đúng vào cột "VNExpress". Định dạng: <b>DD/M HH:MM</b> (vd: <b>12/6 02:00</b>).
  Để trống nếu giờ đã đúng.
</p>
<div class="legend">
  <span class="dot-ok">■ đúng</span>
  <span class="dot-chg">■ cần sửa</span>
  <span class="dot-empty">■ chưa nhập</span>
</div>

      <th>VNExpress (nhập vào)</th>
      <th></th>
    </tr>

  <tbody id="tbody"></tbody>

<button onclick="generateFixes()">Tạo danh sách sửa</button>

  {id:'L6',h:'CRO',a:'GHA',utc:'2026-06-27T21:00Z'},

function utcToVNT(utcStr) {
  const d = new Date(utcStr);
  const vnt = new Date(d.getTime() + 7 * 3600 * 1000);
  const day = vnt.getUTCDate();
  const month = vnt.getUTCMonth() + 1;
  const hh = String(vnt.getUTCHours()).padStart(2, '0');
  const mm = String(vnt.getUTCMinutes()).padStart(2, '0');
  return `${day}/${month} ${hh}:${mm}`;
}

function parseVNT(str, refUtc) {
  // Accepts "DD/M HH:MM" or "D/M HH:MM"
  str = str.trim();
  const m = str.match(/^(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const day = parseInt(m[1]), month = parseInt(m[2]);
  const hh = parseInt(m[3]), mm = parseInt(m[4]);
  // Determine year from ref utc (2026)
  const year = 2026;
  // Build UTC from VNT (subtract 7h)
  const vntMs = Date.UTC(year, month - 1, day, hh, mm, 0);
  const utcMs = vntMs - 7 * 3600 * 1000;
  const d = new Date(utcMs);
  const utcH = String(d.getUTCHours()).padStart(2, '0');
  const utcM = String(d.getUTCMinutes()).padStart(2, '0');
  const utcDay = d.getUTCDate();
  const utcMonth = String(d.getUTCMonth() + 1).padStart(2, '0');
  return `${year}-${utcMonth}-${String(utcDay).padStart(2,'0')}T${utcH}:${utcM}Z`;
}

// Render table
const tbody = document.getElementById('tbody');
let lastGroup = '';
matches.forEach(m => {
  const grp = m.id[0];
  if (grp !== lastGroup) {
    const sep = document.createElement('tr');
    sep.className = 'group-sep';
    sep.innerHTML = `<td colspan="5">── Bảng ${grp} ──</td>`;
    tbody.appendChild(sep);
    lastGroup = grp;
  }
  const currentVNT = utcToVNT(m.utc);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="id">${m.id}</td>
    <td class="teams">${m.h} - ${m.a}</td>
    <td class="current">${currentVNT}</td>
    <td class="correct"><input type="text" id="inp_${m.id}" placeholder="${currentVNT}" oninput="checkInput('${m.id}','${currentVNT}','${m.utc}')"></td>
    <td class="status" id="st_${m.id}"><span class="dot-empty">—</span></td>
  `;
  tbody.appendChild(tr);
});

function checkInput(id, currentVNT, currentUtc) {
  const inp = document.getElementById('inp_' + id);
  const st = document.getElementById('st_' + id);
  const val = inp.value.trim();
  if (!val) {
    inp.className = '';
    st.innerHTML = '<span class="dot-empty">—</span>';
    return;
  }
  const newUtc = parseVNT(val, currentUtc);
  if (!newUtc) {
    inp.className = 'changed';
    st.innerHTML = '<span style="color:#f44">?</span>';
    return;
  }
  if (newUtc === currentUtc) {
    inp.className = 'ok';
    st.innerHTML = '<span class="dot-ok">✓</span>';
  } else {
    inp.className = 'changed';
    st.innerHTML = '<span class="dot-chg">✱</span>';
  }
}

function generateFixes() {
  const lines = [];
  let changeCount = 0;
  matches.forEach(m => {
    const inp = document.getElementById('inp_' + m.id);
    const val = inp.value.trim();
    if (!val) return;
    const newUtc = parseVNT(val, m.utc);
    if (!newUtc || newUtc === m.utc) return;
    const oldVNT = utcToVNT(m.utc);
    const newVNT = utcToVNT(newUtc);
    lines.push(`${m.id}  ${m.h}-${m.a}  ${oldVNT} → ${newVNT}  (utc: '${m.utc}' → '${newUtc}')`);
    changeCount++;
  });

  const out = document.getElementById('output');
  const sum = document.getElementById('summary');
  if (lines.length === 0) {
    sum.textContent = 'Không có thay đổi nào.';
    out.className = '';
    out.textContent = '';
  } else {
    sum.textContent = `Cần sửa ${changeCount} trận:`;
    out.className = 'has-changes';
    out.textContent = lines.join('\n');
  }
}
